name: CI/CD

on:
  pull_request:
    branches: [main, restart]
  push:
    branches: [main, restart]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint -- --ignore-pattern "src/__tests__/**"

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
        env:
          DB_URL: mongodb://localhost:27017/test
          PORT: 5000
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
          COOKIE_DOMAIN: localhost
          JWT_ACCESS_SECRET: test-access-secret
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_SECRET: test-refresh-secret
          JWT_REFRESH_EXPIRES: 30d
          BCRYPT_SALT_ROUND: 10
          SUPER_ADMIN_EMAIL: admin@test.com
          SUPER_ADMIN_PASSWORD: Admin123!
          CLIENT_URL: http://localhost:3000
          EXPRESS_SESSION_SECRET: test-session-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --production

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
        continue-on-error: true

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude .git \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
        continue-on-error: true

      - name: Restart service
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && bun install --production && pm2 restart wallet-api || echo 'pm2 not configured'"
        continue-on-error: true