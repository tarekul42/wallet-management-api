on:
  pull_request:
  push:
    branches:
      - main

name: CI

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: |
          if [ -f tsconfig.json ]; then
            bun tsc --noEmit
          else
            echo "No tsconfig.json — skipping tsc check"
          fi

      - name: Lint
        run: |
          if bun run lint --if-present; then
            echo "Lint passed (or no lint script)"
          else
            exit 1
          fi

      - name: Run tests
        run: |
          if bun test --if-present; then
            echo "Tests passed (or no test script)"
          else
            exit 1
          fi

      - name: Build
        run: |
          if bun run build --if-present; then
            echo "Build succeeded (or no build script)"
          else
            exit 1
          fi